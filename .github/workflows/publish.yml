name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

concurrency:
  group: npm-publish
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish
    needs: ci
    if: github.repository_owner == 'cloudflare'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for changelog generation

      - uses: ./.github/actions/setup-node-pnpm
        with:
          registry-url: https://registry.npmjs.org

      - name: Build
        run: pnpm run build

      - name: Bump version
        id: version
        working-directory: packages/vinext
        run: |
          LATEST=$(npm view vinext version 2>/dev/null || echo "0.0.0")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"

          case "${{ inputs.bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          npm version "$VERSION" --no-git-tag-version
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing vinext@${VERSION} (was ${LATEST})"
          echo "previous=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Publish (OIDC trusted publishing)
        working-directory: packages/vinext
        run: pnpm publish --access public --provenance

      - name: Tag release
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Get changes since last version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV_TAG="v${{ steps.version.outputs.previous }}"
          FORMAT="%H %s"
          if git rev-parse "$PREV_TAG" >/dev/null 2>&1; then
            git log "$PREV_TAG"..HEAD --format="$FORMAT" --no-merges > /tmp/raw-commits.txt
          else
            # No previous tag found, grab recent commits
            git log --format="$FORMAT" --no-merges -30 > /tmp/raw-commits.txt
          fi

          # Resolve GitHub @usernames for each commit via the API
          while IFS= read -r line; do
            SHA=$(echo "$line" | cut -d' ' -f1)
            SUBJECT=$(echo "$line" | cut -d' ' -f2-)
            LOGIN=$(gh api "repos/${{ github.repository }}/commits/${SHA}" --jq '.author.login // .commit.author.name' 2>/dev/null || echo "")
            if [ -n "$LOGIN" ]; then
              echo "${SHA:0:7} ${SUBJECT} (@${LOGIN})"
            else
              echo "${SHA:0:7} ${SUBJECT}"
            fi
          done < /tmp/raw-commits.txt > /tmp/commits.txt

      - name: Generate release summary
        id: summary
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_AI_GATEWAY_ACCOUNT_ID }}
          CF_GATEWAY_NAME: ${{ secrets.CF_AI_GATEWAY_NAME }}
          CF_API_TOKEN: ${{ secrets.CF_AI_GATEWAY_TOKEN }}
        run: |
          COMMITS=$(cat /tmp/commits.txt)
          echo "::group::Commits since last release"
          echo "$COMMITS"
          echo "::endgroup::"

          RESPONSE=$(curl -s --max-time 30 \
            "https://gateway.ai.cloudflare.com/v1/${CF_ACCOUNT_ID}/${CF_GATEWAY_NAME}/anthropic/v1/messages" \
            -H "Content-Type: application/json" \
            -H "cf-aig-authorization: Bearer ${CF_API_TOKEN}" \
            -H "anthropic-version: 2023-06-01" \
            -d "$(jq -n --arg commits "$COMMITS" --arg version "${{ steps.version.outputs.version }}" '{
              model: "claude-sonnet-4-20250514",
              max_tokens: 1024,
              messages: [{
                role: "user",
                content: ("You are writing GitHub release notes for vinext v" + $version + " — a Vite plugin that reimplements the Next.js API surface for Cloudflare Workers.\n\nHere are the commits since the last release (format: hash subject (@github-username)):\n\n" + $commits + "\n\nWrite release notes in standard GitHub release format. Use these guidelines:\n- Group changes under markdown headings: ## What'\''s Changed, then subheadings like ### New Features, ### Bug Fixes, ### Performance, ### Internal / Chores — only include a subheading if there are relevant commits for it\n- Under each subheading, write bullet points. Each bullet should describe the change in plain English from a user'\''s perspective — not just repeat the commit message verbatim\n- Do NOT credit contributors inline in bullet points\n- At the very end, add a ## Contributors section listing each unique contributor as @username (keep the @ prefix so GitHub renders it as a mention), one per line\n- Omit noise like typo fixes, dependency bumps, and CI-only changes unless they are meaningful to users\n- No preamble or closing remarks — just the release notes")
              }]
            }')") || true

          SUMMARY=""
          if [ -n "$RESPONSE" ]; then
            # Check for API errors
            ERROR=$(echo "$RESPONSE" | jq -r '.error.message // empty' 2>/dev/null)
            if [ -n "$ERROR" ]; then
              echo "::warning::AI Gateway error: $ERROR"
            else
              SUMMARY=$(echo "$RESPONSE" | jq -r '.content[0].text // empty' 2>/dev/null)
            fi
          fi

          if [ -z "$SUMMARY" ]; then
            SUMMARY="See commits: https://github.com/${{ github.repository }}/commits/v${{ steps.version.outputs.version }}"
          fi

          echo "::group::Release summary"
          echo "$SUMMARY"
          echo "::endgroup::"

          {
            echo "text<<EOFMARKER"
            echo "$SUMMARY"
            echo "EOFMARKER"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          SUMMARY: ${{ steps.summary.outputs.text }}
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file - \
            --repo "${{ github.repository }}" <<< "${SUMMARY}"

      - name: Notify Google Chat
        if: success()
        continue-on-error: true
        env:
          GOOGLE_CHAT_WEBHOOK: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
          VERSION: ${{ steps.version.outputs.version }}
          SUMMARY: ${{ steps.summary.outputs.text }}
        run: |
          PAYLOAD=$(jq -n \
            --arg version "$VERSION" \
            --arg summary "$SUMMARY" \
            '{"text": ("*vinext v" + $version + " published to npm*\n\n" + $summary + "\n\nnpm: https://www.npmjs.com/package/vinext/v/" + $version)}')

          echo "::group::Webhook payload"
          echo "$PAYLOAD"
          echo "::endgroup::"

          RESPONSE=$(curl -sS -w "\nHTTP %{http_code}" -X POST "$GOOGLE_CHAT_WEBHOOK" \
            -H "Content-Type: application/json; charset=UTF-8" \
            -d "$PAYLOAD")

          echo "$RESPONSE"
